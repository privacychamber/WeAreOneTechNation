name: Deploy to Namecheap

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Path Marker
        run: echo "Pathfinder version 2.0" > dist/pathfinder.txt

      - name: Discover Server Structure
        run: |
          echo "Listing FTP Root:" > dist/server_map.txt
          # We use a trick here: upload a dummy file and hope the logs show the path
          # Or we can try to use a different action to list.
          # For now, let's just try the most likely Namecheap addon domain path.

      - name: Deploy to Server Root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./
          state-name: .sync-root.json
